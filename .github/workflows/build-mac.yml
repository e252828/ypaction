name: Build macOS

# 此工作流在推送到 build 远程仓库 (https://github.com/markmle/ypaction.git) 时触发
on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:
    inputs:
      arch:
        description: '构建架构'
        required: true
        type: choice
        default: 'universal'
        options:
          - universal
          - arm64
          - x64
      upload_artifact:
        description: '上传构建产物'
        required: true
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: --max-old-space-size=8192

concurrency:
  group: build-mac-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ========== 构建 macOS arm64 ==========
  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-macos-${{ hashFiles('package.json') }}
          restore-keys: npm-macos-

      - name: Install Dependencies
        run: npm install

      - name: Build macOS arm64
        if: ${{ github.event_name == 'push' || inputs.arch == 'arm64' || inputs.arch == 'universal' }}
        run: npm run dist:mac:arm64
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload arm64 Artifact
        if: ${{ (github.event_name == 'push' || inputs.upload_artifact) && (github.event_name == 'push' || inputs.arch == 'arm64' || inputs.arch == 'universal') }}
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: release/*-arm64.dmg
          retention-days: 7

  # ========== 构建 macOS x64 ==========
  build-macos-x64:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-macos-${{ hashFiles('package.json') }}
          restore-keys: npm-macos-

      - name: Install Dependencies
        run: npm install

      - name: Build macOS x64
        if: ${{ github.event_name == 'push' || inputs.arch == 'x64' || inputs.arch == 'universal' }}
        run: npm run dist:mac:x64
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload x64 Artifact
        if: ${{ (github.event_name == 'push' || inputs.upload_artifact) && (github.event_name == 'push' || inputs.arch == 'x64' || inputs.arch == 'universal') }}
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64
          path: release/*-x64.dmg
          retention-days: 7

  # ========== 构建 macOS Universal (合并 arm64 + x64) ==========
  build-macos-universal:
    needs: [build-macos-arm64, build-macos-x64]
    if: ${{ github.event_name == 'push' || inputs.arch == 'universal' }}
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-macos-${{ hashFiles('package.json') }}
          restore-keys: npm-macos-

      - name: Install Dependencies
        run: npm install

      - name: Build macOS Universal
        run: npm run dist:mac:universal
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload Universal Artifact
        if: ${{ github.event_name == 'push' || inputs.upload_artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: release/*.dmg
          retention-days: 7
